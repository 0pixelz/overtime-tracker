<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Mes Heures</title>
<meta name="theme-color" content="#7c2d2d">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Heures">
<link rel="manifest" href="./manifest.json">
<link rel="icon" type="image/png" sizes="192x192" href="./icons/icon-192.png">
<link rel="icon" type="image/png" sizes="512x512" href="./icons/icon-512.png">
<link rel="apple-touch-icon" href="./icons/icon-192.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,700;9..144,900&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="./styles.css">

</head>
<body>

<header>
  <div class="hdr-inner">
    <div class="brand">
      <div class="brand-mark">H</div>
      <h1>Mes <em>Heures</em></h1>
    </div>
    <button class="hdr-btn" onclick="openSettings()" aria-label="Paramètres">⚙</button>
  </div>
</header>

<main>
  <!-- Week nav -->
  <div class="week-nav">
    <button class="nav-arrow" onclick="navWeek(-1)" aria-label="Semaine précédente">‹</button>
    <div class="week-center">
      <div class="week-label" id="week-label">—</div>
      <div class="week-sub" id="week-sub">—</div>
    </div>
    <button class="nav-arrow" onclick="navWeek(1)" aria-label="Semaine suivante">›</button>
    <button class="today-chip" id="today-chip" onclick="goToday()">Auj.</button>
  </div>

  <!-- Summary -->
  <div class="summary">
    <div class="summary-top">
      <div class="summary-worked">
        <span id="sum-worked">0:00</span><span class="slash"> / </span><span class="target" id="sum-target">37:30</span>
      </div>
      <div class="summary-diff empty" id="sum-diff">—</div>
    </div>
    <div class="progress"><div class="progress-fill" id="progress-fill" style="width:0%"></div></div>
    <div class="summary-labels">
      <span id="sum-days">0 / 5 jours</span>
      <span id="sum-status">À saisir</span>
    </div>
  </div>

  <!-- Days -->
  <div class="days" id="days"></div>

  <!-- History -->
  <div class="history">
    <h2>Historique <span class="small" id="hist-count"></span></h2>
    <div class="history-list" id="history-list"></div>
  </div>
</main>

<!-- Settings modal -->
<div class="modal-overlay" id="settings-modal">
  <div class="modal">
    <div class="modal-grip"></div>
    <h2>Paramètres <button class="close" onclick="closeSettings()" aria-label="Fermer">✕</button></h2>
    <div class="modal-subtitle">Personnalise l'app selon ton horaire</div>

    <div class="set-group">
      <label>Heures par jour (objectif)</label>
      <input type="number" id="set-hours" step="0.25" min="1" max="24" value="7.5">
      <div class="hint">Ex. 7.5 = 7h30 (net, lunch exclu)</div>
    </div>

    <div class="set-group">
      <label>Jours travaillés par semaine</label>
      <select id="set-days">
        <option value="5">5 jours (Lun–Ven)</option>
        <option value="4">4 jours (Lun–Jeu)</option>
        <option value="6">6 jours (Lun–Sam)</option>
      </select>
    </div>

    <div class="set-group">
      <label>Arrivée par défaut</label>
      <input type="time" id="set-start" value="08:00">
    </div>

    <div class="set-group">
      <label>Départ par défaut</label>
      <input type="time" id="set-end" value="16:30">
    </div>

    <div class="set-group">
      <label>Durée de lunch par défaut</label>
      <select id="set-lunch">
        <option value="0">Aucun</option>
        <option value="30">30 min</option>
        <option value="45">45 min</option>
        <option value="60" selected>60 min (1h)</option>
        <option value="90">90 min (1h30)</option>
      </select>
    </div>

    <button class="save-btn" onclick="saveSettings()">Enregistrer</button>

    <div class="danger-zone">
      <h3>Zone de danger</h3>
      <button class="danger-btn" onclick="clearAllData()">Effacer toutes les données</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="./app.js"></script>

</body>
</html>
