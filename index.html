<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Mes Heures</title>
<meta name="theme-color" content="#7c2d2d">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Heures">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,700;9..144,900&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #faf7f2;
    --surface: #ffffff;
    --surface-2: #f3ede3;
    --border: #e6ddcd;
    --border-strong: #d4c7b0;
    --ink: #1e1a15;
    --ink-soft: #5a5248;
    --muted: #8a8073;
    --accent: #7c2d2d;
    --accent-soft: #f5e6e3;
    --success: #2d6a4f;
    --success-soft: #e1f0e7;
    --warn: #b45309;
    --warn-soft: #fdf0d9;
    --over: #1e40af;
    --over-soft: #e0e8f5;
    --danger: #9b2c2c;
    --radius: 14px;
    --radius-sm: 10px;
    --shadow-sm: 0 1px 2px rgba(30,26,21,0.04), 0 1px 1px rgba(30,26,21,0.03);
    --shadow: 0 4px 12px rgba(30,26,21,0.06), 0 1px 3px rgba(30,26,21,0.04);
    --shadow-lg: 0 20px 40px rgba(30,26,21,0.12), 0 8px 16px rgba(30,26,21,0.08);
    --sans: 'Inter', -apple-system, system-ui, sans-serif;
    --serif: 'Fraunces', Georgia, serif;
    --mono: 'JetBrains Mono', ui-monospace, monospace;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html { -webkit-text-size-adjust: 100%; }
  body {
    background: var(--bg);
    color: var(--ink);
    font-family: var(--sans);
    font-size: 15px;
    line-height: 1.5;
    min-height: 100vh;
    min-height: 100dvh;
    padding-bottom: env(safe-area-inset-bottom);
    overflow-x: hidden;
  }

  button { font: inherit; border: 0; cursor: pointer; background: none; color: inherit; }
  input, select, textarea { font: inherit; color: inherit; }
  input[type="time"], input[type="number"], input[type="text"], select, textarea {
    width: 100%;
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 12px 14px;
    font-size: 16px; /* prevents iOS zoom */
    color: var(--ink);
    outline: none;
    transition: border-color .15s, box-shadow .15s;
    -webkit-appearance: none;
    appearance: none;
    min-height: 48px;
  }
  input[type="time"]:focus, input[type="number"]:focus, input[type="text"]:focus, select:focus, textarea:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px var(--accent-soft);
  }
  input[type="time"] {
    font-family: var(--mono);
    font-weight: 600;
    letter-spacing: .02em;
  }

  /* ------ HEADER ------ */
  header {
    background: linear-gradient(180deg, #7c2d2d 0%, #6b2424 100%);
    color: #fff;
    padding: calc(env(safe-area-inset-top) + 14px) 20px 18px;
    position: sticky;
    top: 0;
    z-index: 50;
    box-shadow: 0 2px 8px rgba(124,45,45,0.15);
  }
  .hdr-inner { max-width: 760px; margin: 0 auto; display: flex; align-items: center; justify-content: space-between; gap: 12px; }
  .brand { display: flex; align-items: center; gap: 10px; }
  .brand-mark {
    width: 34px; height: 34px;
    background: rgba(255,255,255,0.15);
    border: 1px solid rgba(255,255,255,0.2);
    border-radius: 10px;
    display: grid; place-items: center;
    font-family: var(--serif);
    font-weight: 900;
    font-size: 17px;
  }
  .brand h1 {
    font-family: var(--serif);
    font-weight: 700;
    font-size: 19px;
    letter-spacing: -0.02em;
  }
  .brand h1 em { font-style: italic; font-weight: 500; opacity: .85; }
  .hdr-btn {
    width: 42px; height: 42px;
    border-radius: 10px;
    background: rgba(255,255,255,0.12);
    border: 1px solid rgba(255,255,255,0.18);
    display: grid; place-items: center;
    font-size: 18px;
    transition: background .15s;
  }
  .hdr-btn:active { background: rgba(255,255,255,0.25); }
  .hdr-btn.hidden { display: none; }
  .hdr-actions { display: flex; gap: 8px; align-items: center; }

  /* ------ CALENDAR MODAL ------ */
  .cal-nav {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 16px; gap: 8px;
  }
  .cal-month-label {
    font-family: var(--serif); font-weight: 700; font-size: 17px;
    letter-spacing: -0.01em; flex: 1; text-align: center;
  }
  .cal-grid {
    display: grid; grid-template-columns: repeat(7, 1fr);
    gap: 3px;
  }
  .cal-day-hdr {
    text-align: center; font-size: 11px; font-weight: 600;
    color: var(--muted); padding: 4px 0 6px;
  }
  .cal-day {
    aspect-ratio: 1;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    border-radius: 8px; font-size: 13px; font-weight: 500;
    cursor: pointer; transition: all .15s; position: relative;
    border: 1.5px solid transparent;
  }
  .cal-day.empty { pointer-events: none; }
  .cal-day.weekend { color: var(--muted); opacity: 0.6; pointer-events: none; }
  .cal-day.today { border-color: var(--accent); color: var(--accent); font-weight: 700; }
  .cal-day.has-data { background: var(--success-soft); color: var(--success); }
  .cal-day.day-off { background: var(--surface-2); color: var(--muted); }
  .cal-day:not(.empty):not(.weekend):active { transform: scale(0.9); }
  .cal-hours { font-size: 9px; font-family: var(--mono); margin-top: 1px; line-height: 1; }

  /* ------ MAIN ------ */
  main { max-width: 760px; margin: 0 auto; padding: 18px 16px 40px; }

  /* ------ WEEK NAV ------ */
  .week-nav {
    display: flex; align-items: center; gap: 8px;
    margin-bottom: 16px;
  }
  .nav-arrow {
    width: 44px; height: 44px;
    border-radius: 12px;
    background: var(--surface);
    border: 1.5px solid var(--border);
    display: grid; place-items: center;
    font-size: 20px;
    color: var(--ink-soft);
    transition: all .15s;
    flex-shrink: 0;
  }
  .nav-arrow:active { background: var(--surface-2); transform: scale(0.96); }
  .week-center {
    flex: 1;
    text-align: center;
    padding: 6px 8px;
  }
  .week-label {
    font-family: var(--serif);
    font-size: 20px;
    font-weight: 700;
    letter-spacing: -0.01em;
    line-height: 1.1;
  }
  .week-sub {
    font-family: var(--mono);
    font-size: 11.5px;
    color: var(--muted);
    margin-top: 3px;
    letter-spacing: .02em;
  }
  .today-chip {
    padding: 8px 14px;
    border-radius: 12px;
    background: var(--accent);
    color: #fff;
    font-size: 13px;
    font-weight: 600;
    border: 1.5px solid var(--accent);
    transition: all .15s;
    min-height: 44px;
    flex-shrink: 0;
  }
  .today-chip:active { transform: scale(0.96); }
  .today-chip.hidden { display: none; }

  /* ------ SUMMARY ------ */
  .summary {
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: var(--radius);
    padding: 18px 20px;
    margin-bottom: 14px;
    box-shadow: var(--shadow-sm);
  }
  .summary-top { display: flex; align-items: baseline; justify-content: space-between; gap: 12px; margin-bottom: 14px; }
  .summary-worked {
    font-family: var(--serif);
    font-weight: 700;
    font-size: 40px;
    line-height: 1;
    letter-spacing: -0.02em;
  }
  .summary-worked .slash { color: var(--muted); font-weight: 500; }
  .summary-worked .target { color: var(--muted); font-size: 22px; font-weight: 500; }
  .summary-diff {
    font-family: var(--mono);
    font-weight: 700;
    font-size: 14px;
    padding: 6px 10px;
    border-radius: 8px;
    white-space: nowrap;
  }
  .summary-diff.pos { background: var(--over-soft); color: var(--over); }
  .summary-diff.neg { background: var(--warn-soft); color: var(--warn); }
  .summary-diff.zero { background: var(--success-soft); color: var(--success); }
  .summary-diff.empty { background: var(--surface-2); color: var(--muted); }

  .progress {
    height: 8px;
    background: var(--surface-2);
    border-radius: 99px;
    overflow: hidden;
    margin-bottom: 10px;
  }
  .progress-fill {
    height: 100%;
    background: var(--accent);
    border-radius: 99px;
    transition: width .4s cubic-bezier(.2,.8,.2,1), background-color .2s;
  }
  .progress-fill.done { background: var(--success); }
  .progress-fill.over { background: var(--over); }

  .summary-labels {
    display: flex; justify-content: space-between;
    font-family: var(--mono);
    font-size: 11px;
    color: var(--muted);
    letter-spacing: .03em;
    text-transform: uppercase;
  }

  /* ------ DAYS ------ */
  .days { display: flex; flex-direction: column; gap: 10px; margin-bottom: 20px; }
  .day {
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
    transition: border-color .2s, box-shadow .2s;
  }
  .day.today { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-soft); }
  .day.has-data { border-color: var(--border-strong); }
  .day.day-off { background: var(--surface-2); }

  .day-head {
    display: flex; align-items: center; gap: 12px;
    padding: 14px 16px;
    cursor: pointer;
    user-select: none;
    min-height: 64px;
  }
  .day-head:active { background: rgba(30,26,21,0.03); }
  .day-name-col {
    display: flex; flex-direction: column;
    min-width: 0;
    flex-shrink: 0;
    width: 92px;
  }
  .day-name {
    font-family: var(--serif);
    font-weight: 700;
    font-size: 16px;
    letter-spacing: -0.01em;
    display: flex; align-items: center; gap: 6px;
  }
  .day-date {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--muted);
    margin-top: 2px;
    letter-spacing: .02em;
  }
  .today-dot {
    width: 6px; height: 6px;
    background: var(--accent);
    border-radius: 99px;
    display: inline-block;
  }

  .day-mid {
    flex: 1;
    min-width: 0;
    display: flex; flex-direction: column; gap: 3px;
  }
  .day-times {
    font-family: var(--mono);
    font-size: 13px;
    color: var(--ink-soft);
    font-weight: 600;
    letter-spacing: .01em;
  }
  .day-times .muted { color: var(--muted); font-weight: 500; }
  .day-times .sep { color: var(--muted); margin: 0 4px; }
  .day-meta {
    font-size: 11.5px;
    color: var(--muted);
    font-family: var(--mono);
    letter-spacing: .02em;
  }
  .empty-hint { color: var(--muted); font-size: 13px; font-style: italic; font-family: var(--sans); }

  .day-right {
    display: flex; flex-direction: column; align-items: flex-end; gap: 4px;
    flex-shrink: 0;
  }
  .day-worked {
    font-family: var(--mono);
    font-weight: 700;
    font-size: 16px;
    letter-spacing: -0.01em;
  }
  .day-worked.zero { color: var(--muted); font-weight: 500; font-size: 12px; font-family: var(--sans); font-style: italic; }
  .day-diff {
    font-family: var(--mono);
    font-size: 11px;
    font-weight: 700;
    padding: 2px 7px;
    border-radius: 6px;
    letter-spacing: .02em;
  }
  .day-diff.pos { background: var(--over-soft); color: var(--over); }
  .day-diff.neg { background: var(--warn-soft); color: var(--warn); }
  .day-diff.zero { background: var(--success-soft); color: var(--success); }
  .day-diff.off { background: var(--surface-2); color: var(--muted); }

  .chev {
    color: var(--muted);
    transition: transform .2s;
    flex-shrink: 0;
    font-size: 12px;
    margin-left: 4px;
  }
  .day.open .chev { transform: rotate(180deg); }

  /* ------ DAY FORM ------ */
  .day-form {
    display: none;
    padding: 0 16px 18px;
    border-top: 1px solid var(--border);
    animation: slide-down .25s ease;
  }
  .day.open .day-form { display: block; }
  @keyframes slide-down {
    from { opacity: 0; transform: translateY(-4px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .form-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    margin-top: 16px;
  }
  .form-field label {
    display: block;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: .06em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 6px;
  }
  .lunch-chips {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
    margin-top: 8px;
  }
  .chip {
    padding: 8px 12px;
    border-radius: 8px;
    background: var(--surface);
    border: 1.5px solid var(--border);
    font-size: 13px;
    font-weight: 600;
    font-family: var(--mono);
    color: var(--ink-soft);
    transition: all .15s;
    min-height: 36px;
  }
  .chip:active { transform: scale(0.94); }
  .chip.active {
    background: var(--accent);
    color: #fff;
    border-color: var(--accent);
  }

  .lunch-row { grid-column: 1 / -1; }

  .day-calc {
    grid-column: 1 / -1;
    padding: 12px 14px;
    background: var(--surface-2);
    border-radius: var(--radius-sm);
    font-family: var(--mono);
    font-size: 13px;
    color: var(--ink-soft);
    line-height: 1.6;
  }
  .day-calc strong { color: var(--ink); font-weight: 700; }
  .day-calc .plus { color: var(--over); }
  .day-calc .minus { color: var(--warn); }
  .day-calc .eq { color: var(--success); }

  .day-actions {
    grid-column: 1 / -1;
    display: flex;
    gap: 8px;
    margin-top: 4px;
    flex-wrap: wrap;
  }
  .action-btn {
    flex: 1;
    min-width: 120px;
    padding: 10px 14px;
    border-radius: var(--radius-sm);
    background: var(--surface);
    border: 1.5px solid var(--border);
    font-size: 13px;
    font-weight: 600;
    color: var(--ink-soft);
    display: flex; align-items: center; justify-content: center; gap: 6px;
    transition: all .15s;
    min-height: 44px;
  }
  .action-btn:active { transform: scale(0.97); background: var(--surface-2); }
  .action-btn.danger { color: var(--danger); border-color: #e8cfcf; }
  .action-btn.danger:active { background: #fdecec; }

  .dayoff-row {
    grid-column: 1 / -1;
    display: flex; align-items: center; gap: 10px;
    padding: 12px 14px;
    background: var(--surface-2);
    border-radius: var(--radius-sm);
    cursor: pointer;
    user-select: none;
    min-height: 48px;
  }
  .dayoff-row input {
    width: 20px; height: 20px;
    accent-color: var(--accent);
    cursor: pointer;
    flex-shrink: 0;
  }
  .dayoff-row span { font-size: 14px; font-weight: 600; color: var(--ink); }

  /* ------ HISTORY ------ */
  .history {
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: var(--radius);
    padding: 18px 20px;
    margin-top: 20px;
  }
  .history h2 {
    font-family: var(--serif);
    font-size: 18px;
    font-weight: 700;
    letter-spacing: -0.01em;
    margin-bottom: 12px;
    display: flex; align-items: center; justify-content: space-between;
  }
  .history h2 .small { font-size: 12px; color: var(--muted); font-family: var(--sans); font-weight: 500; }
  .history-list { display: flex; flex-direction: column; gap: 6px; }
  .history-item {
    display: flex; align-items: center; justify-content: space-between;
    gap: 12px;
    padding: 12px 14px;
    border-radius: var(--radius-sm);
    background: var(--surface-2);
    border: 1px solid transparent;
    cursor: pointer;
    transition: all .15s;
    min-height: 52px;
  }
  .history-item:active { transform: scale(0.99); }
  .history-item.current { border-color: var(--accent); background: var(--accent-soft); }
  .h-left { flex: 1; min-width: 0; }
  .h-week { font-weight: 700; font-size: 14px; letter-spacing: -0.01em; }
  .h-dates { font-family: var(--mono); font-size: 11px; color: var(--muted); margin-top: 2px; }
  .h-right { text-align: right; }
  .h-total { font-family: var(--mono); font-weight: 700; font-size: 14px; }
  .h-diff { font-family: var(--mono); font-size: 11px; margin-top: 2px; }
  .h-diff.pos { color: var(--over); }
  .h-diff.neg { color: var(--warn); }
  .h-diff.zero { color: var(--success); }
  .history-empty { padding: 20px; text-align: center; color: var(--muted); font-size: 14px; font-style: italic; }

  /* ------ MODAL ------ */
  .modal-overlay {
    position: fixed; inset: 0;
    background: rgba(30,26,21,0.45);
    backdrop-filter: blur(4px);
    display: none;
    align-items: flex-end;
    justify-content: center;
    z-index: 100;
    padding: 0;
    animation: fade-in .2s ease;
  }
  .modal-overlay.open { display: flex; }
  @keyframes fade-in { from { opacity: 0; } to { opacity: 1; } }
  @keyframes slide-up { from { transform: translateY(100%); } to { transform: translateY(0); } }

  .modal {
    background: var(--bg);
    border-radius: 20px 20px 0 0;
    width: 100%;
    max-width: 560px;
    max-height: 92vh;
    overflow-y: auto;
    padding: 24px 20px calc(24px + env(safe-area-inset-bottom));
    animation: slide-up .28s cubic-bezier(.2,.8,.2,1);
    box-shadow: var(--shadow-lg);
  }
  .modal-grip {
    width: 40px; height: 4px;
    background: var(--border-strong);
    border-radius: 99px;
    margin: -8px auto 16px;
  }
  .modal h2 {
    font-family: var(--serif);
    font-size: 22px;
    font-weight: 700;
    letter-spacing: -0.02em;
    margin-bottom: 4px;
    display: flex; align-items: center; justify-content: space-between;
  }
  .modal h2 .close {
    width: 36px; height: 36px;
    border-radius: 10px;
    background: var(--surface-2);
    display: grid; place-items: center;
    font-size: 18px;
    color: var(--ink-soft);
  }
  .modal-subtitle { font-size: 13px; color: var(--muted); margin-bottom: 20px; }

  .set-group { margin-bottom: 16px; }
  .set-group label {
    display: block;
    font-size: 13px;
    font-weight: 600;
    color: var(--ink);
    margin-bottom: 6px;
  }
  .set-group .hint { font-size: 12px; color: var(--muted); margin-top: 6px; }
  .save-btn {
    width: 100%;
    background: var(--accent);
    color: #fff;
    padding: 14px;
    border-radius: var(--radius-sm);
    font-size: 15px;
    font-weight: 700;
    margin-top: 10px;
    min-height: 52px;
    transition: transform .1s;
  }
  .save-btn:active { transform: scale(0.98); }

  .danger-zone {
    margin-top: 24px;
    padding-top: 20px;
    border-top: 1px solid var(--border);
  }
  .danger-zone h3 { font-size: 13px; font-weight: 700; color: var(--danger); margin-bottom: 8px; text-transform: uppercase; letter-spacing: .04em; }
  .danger-btn {
    width: 100%;
    padding: 12px;
    border-radius: var(--radius-sm);
    background: transparent;
    border: 1.5px solid #e8cfcf;
    color: var(--danger);
    font-weight: 600;
    font-size: 13px;
    min-height: 44px;
  }
  .danger-btn:active { background: #fdecec; }

  /* ------ TOAST ------ */
  .toast {
    position: fixed;
    bottom: calc(20px + env(safe-area-inset-bottom));
    left: 50%;
    transform: translateX(-50%) translateY(100px);
    background: var(--ink);
    color: #fff;
    padding: 12px 20px;
    border-radius: 99px;
    font-size: 14px;
    font-weight: 600;
    box-shadow: var(--shadow-lg);
    opacity: 0;
    transition: transform .25s, opacity .2s;
    z-index: 200;
    pointer-events: none;
    max-width: 90vw;
  }
  .toast.show {
    transform: translateX(-50%) translateY(0);
    opacity: 1;
  }

  /* ------ NARROW PHONES ------ */
  @media (max-width: 380px) {
    .day-name-col { width: 78px; }
    .day-name { font-size: 15px; }
    .summary-worked { font-size: 34px; }
    .summary-worked .target { font-size: 20px; }
  }

  /* ------ TABLET+ ------ */
  @media (min-width: 640px) {
    main { padding: 28px 24px 60px; }
    .form-grid { grid-template-columns: 1fr 1fr 1fr; }
    .lunch-row { grid-column: 1 / -1; }
  }
</style>
</head>
<body>

<header>
  <div class="hdr-inner">
    <div class="brand">
      <div class="brand-mark">H</div>
      <h1>Mes <em>Heures</em></h1>
    </div>
    <div class="hdr-actions">

<div class="modal-overlay" id="settings-modal">
  <div class="modal">

    <h2>Paramètres <button class="close" onclick="closeSettings()" aria-label="Fermer">✕</button></h2>
    <div class="modal-subtitle">Personnalise l'app selon ton horaire</div>

        <option value="0">Aucun</option>

<div class="toast" id="toast"></div>

<script>
// ================================================================
//  STATE
// ================================================================
const DEFAULTS = {
  hoursPerDay: 7.5,
  workDays: 5,
  defaultStart: '08:00',
  defaultEnd: '16:30',
  defaultLunch: 60
};
let settings = { ...DEFAULTS };
let data = {};          // { 'YYYY-MM-DD': { start, end, lunch, dayOff } }
let weekOffset = 0;
let openDays = new Set();

const DAYS_FR = ['Lundi', 'Mardi', 'Mercredi', 'Jeudi', 'Vendredi', 'Samedi', 'Dimanche'];
const DAYS_SHORT = ['Lun', 'Mar', 'Mer', 'Jeu', 'Ven', 'Sam', 'Dim'];
const LUNCH_PRESETS = [0, 30, 45, 60, 90];

// ================================================================
//  PERSISTENCE
// ================================================================
function loadAll() {
  try {
    const s = localStorage.getItem('mh_settings');
    if (s) settings = { ...DEFAULTS, ...JSON.parse(s) };
    const d = localStorage.getItem('mh_data');
    if (d) data = JSON.parse(d);
  } catch (e) { console.warn('Load error', e); }
}
function saveAll() {
  try {
    localStorage.setItem('mh_settings', JSON.stringify(settings));
    localStorage.setItem('mh_data', JSON.stringify(data));
  } catch (e) { console.warn('Save error', e); }
}

// ================================================================
//  DATE HELPERS
// ================================================================
function pad(n) { return String(n).padStart(2, '0'); }
function ymd(d) { return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`; }
function todayYMD() { return ymd(new Date()); }
function getMonday(offset = 0) {
  const d = new Date();
  d.setHours(0, 0, 0, 0);
  const day = d.getDay();
  const diff = day === 0 ? -6 : 1 - day;
  d.setDate(d.getDate() + diff + offset * 7);
  return d;
}
function weekDates(offset) {
  const m = getMonday(offset);
  return Array.from({ length: 7 }, (_, i) => {
    const d = new Date(m);
    d.setDate(m.getDate() + i);
    return d;
  });
}
function weekKey(offset) {
  const m = getMonday(offset);
  const jan1 = new Date(m.getFullYear(), 0, 1);
  const wn = Math.ceil(((m - jan1) / 86400000 + jan1.getDay() + 1) / 7);
  return `${m.getFullYear()}-W${pad(wn)}`;
}
function fmtDate(d) {
  return d.toLocaleDateString('fr-CA', { day: '2-digit', month: 'short' }).replace('.', '');
}

// ================================================================
//  TIME MATH (all in minutes)
// ================================================================
function parseT(t) {
  if (!t) return null;
  const [h, m] = t.split(':').map(Number);
  return h * 60 + m;
}
function fmtMin(min, showSign = false) {
  if (min == null) return '—';
  const sign = min < 0 ? '−' : (showSign && min > 0 ? '+' : '');
  const abs = Math.abs(min);
  return `${sign}${Math.floor(abs / 60)}:${pad(abs % 60)}`;
}
function calcDay(obj) {
  if (!obj || obj.dayOff) return { worked: null, diff: null, lunch: null };
  const s = parseT(obj.start);
  const e = parseT(obj.end);
  const l = obj.lunch != null ? Number(obj.lunch) : settings.defaultLunch;
  if (s == null || e == null || e <= s) return { worked: null, diff: null, lunch: l };
  const worked = (e - s) - l;
  const target = settings.hoursPerDay * 60;
  return { worked, diff: worked - target, lunch: l };
}

// ================================================================
//  RENDER
// ================================================================
function render() {
  const dates = weekDates(weekOffset);
  const mon = dates[0];
  const key = weekKey(weekOffset);
  const wn = key.split('-W')[1];

  // Week header
  let label;
  if (weekOffset === 0) label = `Cette semaine`;
  else if (weekOffset === -1) label = `Semaine passée`;
  else if (weekOffset === 1) label = `Semaine prochaine`;
  else label = `Semaine ${wn}`;

  document.getElementById('week-label').textContent = label;
  const numDays = settings.workDays;
  const lastWorkDay = dates[numDays - 1];
  document.getElementById('week-sub').textContent =
    `${fmtDate(dates[0])} — ${fmtDate(lastWorkDay)} · S${wn}`;
  document.getElementById('today-chip').classList.toggle('hidden', weekOffset === 0);

  // Days
  const container = document.getElementById('days');
  container.innerHTML = '';
  let totalWorked = 0;
  let filledDays = 0;
  let anyData = false;

  for (let i = 0; i < numDays; i++) {
    const d = dates[i];
    const ds = ymd(d);
    const isToday = ds === todayYMD();
    const obj = data[ds] || null;
    const calc = calcDay(obj);

    if (obj && (obj.start || obj.end || obj.dayOff)) anyData = true;
    if (obj && obj.dayOff) filledDays++;
    else if (calc.worked != null) { totalWorked += calc.worked; filledDays++; }

    container.appendChild(renderDay(i, d, ds, isToday, obj, calc));
  }

  // Summary
  const targetWeek = settings.hoursPerDay * numDays * 60;
  const diff = anyData ? totalWorked - targetWeek : null;

  document.getElementById('sum-worked').textContent = anyData ? fmtMin(totalWorked) : '0:00';
  document.getElementById('sum-target').textContent = fmtMin(targetWeek);

  const diffEl = document.getElementById('sum-diff');
  if (!anyData) {
    diffEl.className = 'summary-diff empty';
    diffEl.textContent = '—';
  } else if (diff === 0) {
    diffEl.className = 'summary-diff zero';
    diffEl.textContent = '✓ objectif';
  } else if (diff > 0) {
    diffEl.className = 'summary-diff pos';
    diffEl.textContent = fmtMin(diff, true) + ' sup.';
  } else {
    diffEl.className = 'summary-diff neg';
    diffEl.textContent = fmtMin(diff) + ' manquant';
  }

  // Progress
  const pct = anyData ? Math.min(100, (totalWorked / targetWeek) * 100) : 0;
  const fill = document.getElementById('progress-fill');
  fill.style.width = pct + '%';
  fill.className = 'progress-fill' + (totalWorked > targetWeek ? ' over' : totalWorked >= targetWeek && anyData ? ' done' : '');

  document.getElementById('sum-days').textContent = `${filledDays} / ${numDays} jours saisis`;
  document.getElementById('sum-status').textContent =
    !anyData ? 'À saisir' :
    filledDays === numDays ? 'Semaine complète' :
    `${numDays - filledDays} restant${numDays - filledDays > 1 ? 's' : ''}`;

  renderHistory();
}

function renderDay(idx, date, ds, isToday, obj, calc) {
  const card = document.createElement('div');
  card.className = 'day';
  if (isToday) card.classList.add('today');
  if (obj && (obj.start || obj.end)) card.classList.add('has-data');
  if (obj && obj.dayOff) card.classList.add('day-off');
  if (openDays.has(ds)) card.classList.add('open');

  // Times pill
  let timesHtml = '';
  if (obj && obj.dayOff) {
    timesHtml = '<span class="empty-hint">Journée de congé</span>';
  } else if (obj && (obj.start || obj.end)) {
    const lunch = obj.lunch != null ? obj.lunch : settings.defaultLunch;
    timesHtml = `
      <span class="day-times">
        <span class="${obj.start ? '' : 'muted'}">${obj.start || '--:--'}</span>
        <span class="sep">→</span>
        <span class="${obj.end ? '' : 'muted'}">${obj.end || '--:--'}</span>
      </span>
      <span class="day-meta">pause ${lunch} min</span>`;
  } else {
    timesHtml = '<span class="empty-hint">Appuie pour saisir</span>';
  }

  // Result
  let workedHtml, diffHtml;
  if (obj && obj.dayOff) {
    workedHtml = '';
    diffHtml = '<span class="day-diff off">Congé</span>';
  } else if (calc.worked != null) {
    workedHtml = `<span class="day-worked">${fmtMin(calc.worked)}</span>`;
    if (calc.diff === 0) diffHtml = '<span class="day-diff zero">✓</span>';
    else if (calc.diff > 0) diffHtml = `<span class="day-diff pos">${fmtMin(calc.diff, true)}</span>`;
    else diffHtml = `<span class="day-diff neg">${fmtMin(calc.diff)}</span>`;
  } else {
    workedHtml = '<span class="day-worked zero">—</span>';
    diffHtml = '';
  }

  // Day name + date
  const dateLabel = date.toLocaleDateString('fr-CA', { day: '2-digit', month: '2-digit' });

  // Lunch chips
  const lunchVal = obj && obj.lunch != null ? obj.lunch : settings.defaultLunch;
  const chipsHtml = LUNCH_PRESETS.map(v =>
    `<button class="chip ${v == lunchVal ? 'active' : ''}" onclick="setLunch('${ds}', ${v})">${v === 0 ? 'Aucun' : v + ' min'}</button>`
  ).join('');

  // Calc breakdown
  let calcHtml = '';
  if (calc.worked != null && !obj?.dayOff) {
    const present = parseT(obj.end) - parseT(obj.start);
    const diffCls = calc.diff === 0 ? 'eq' : calc.diff > 0 ? 'plus' : 'minus';
    calcHtml = `<div class="day-calc">
      Présence <strong>${fmtMin(present)}</strong> − pause <strong>${fmtMin(calc.lunch)}</strong> =
      travail <strong>${fmtMin(calc.worked)}</strong>
      <br>Objectif ${fmtMin(settings.hoursPerDay*60)} →
      <strong class="${diffCls}">${fmtMin(calc.diff, true)}</strong>
    </div>`;
  }

  const isDayOff = obj && obj.dayOff;

  card.innerHTML = `
    <div class="day-head" onclick="toggleDay('${ds}')">
      <div class="day-name-col">
        <div class="day-name">${DAYS_FR[idx]}${isToday ? '<span class="today-dot"></span>' : ''}</div>
        <div class="day-date">${dateLabel}</div>
      </div>
      <div class="day-mid">${timesHtml}</div>
      <div class="day-right">${workedHtml}${diffHtml}</div>
      <span class="chev">▼</span>
    </div>
    <div class="day-form">
      <div class="form-grid">
        <label class="dayoff-row">
          <input type="checkbox" ${isDayOff ? 'checked' : ''} onchange="toggleDayOff('${ds}', this.checked)">
          <span>Journée de congé / absent</span>
        </label>

        ${!isDayOff ? `
        <div class="form-field">
          <label>Arrivée</label>
          <input type="time" value="${(obj && obj.start) || settings.defaultStart}"
                 onchange="setField('${ds}', 'start', this.value)">
        </div>
        <div class="form-field">
          <label>Départ</label>
          <input type="time" value="${(obj && obj.end) || settings.defaultEnd}"
                 onchange="setField('${ds}', 'end', this.value)">
        </div>
        <div class="form-field lunch-row">
          <label>Pause lunch</label>
          <div class="lunch-chips">${chipsHtml}</div>
        </div>
        ${calcHtml}
        ` : ''}

        <div class="day-actions">
          <button class="action-btn" onclick="copyPrevious('${ds}', ${idx})">↓ Copier jour précédent</button>
          <button class="action-btn danger" onclick="resetDay('${ds}')">Effacer ce jour</button>
        </div>
      </div>
    </div>
  `;
  return card;
}

function renderHistory() {
  const list = document.getElementById('history-list');
  list.innerHTML = '';

  // Get all weeks with data, sorted newest first
  const weeks = [];
  for (let offset = -52; offset <= 4; offset++) {
    const key = weekKey(offset);
    const dates = weekDates(offset);
    const numDays = settings.workDays;

    let total = 0;
    let filled = 0;
    let hasAny = false;

    for (let i = 0; i < numDays; i++) {
      const ds = ymd(dates[i]);
      const obj = data[ds];
      if (!obj) continue;
      if (obj.dayOff) { filled++; hasAny = true; continue; }
      const c = calcDay(obj);
      if (c.worked != null) { total += c.worked; filled++; hasAny = true; }
    }

    if (hasAny) {
      weeks.push({ key, offset, dates, total, filled, numDays });
    }
  }

  weeks.sort((a, b) => b.offset - a.offset);

  const curKey = weekKey(weekOffset);
  document.getElementById('hist-count').textContent = weeks.length ? `${weeks.length} sem.` : '';

  if (weeks.length === 0) {
    list.innerHTML = '<div class="history-empty">Aucune donnée saisie.<br>Commence par saisir ta semaine.</div>';
    return;
  }

  weeks.slice(0, 12).forEach(w => {
    const target = settings.hoursPerDay * w.numDays * 60;
    const diff = w.total - target;
    const diffCls = diff === 0 ? 'zero' : diff > 0 ? 'pos' : 'neg';

    const item = document.createElement('div');
    item.className = 'history-item' + (w.key === curKey ? ' current' : '');
    item.onclick = () => { weekOffset = w.offset; openDays.clear(); render(); window.scrollTo({ top: 0, behavior: 'smooth' }); };
    item.innerHTML = `
      <div class="h-left">
        <div class="h-week">Semaine ${w.key.split('-W')[1]} ${w.key === curKey ? '· actuelle' : ''}</div>
        <div class="h-dates">${fmtDate(w.dates[0])} — ${fmtDate(w.dates[w.numDays-1])} · ${w.filled}/${w.numDays} j</div>
      </div>
      <div class="h-right">
        <div class="h-total">${fmtMin(w.total)}</div>
        <div class="h-diff ${diffCls}">${diff === 0 ? '✓ objectif' : fmtMin(diff, true)}</div>
      </div>
    `;
    list.appendChild(item);
  });
}

// ================================================================
//  INTERACTIONS
// ================================================================
function toggleDay(ds) {
  if (openDays.has(ds)) {
    openDays.delete(ds);
  } else {
    openDays.add(ds);
    // Zero-tap entry: if this is today or a past day with no data yet,
    // auto-log the default hours. User can adjust if they worked different hours.
    if (!data[ds] && ds <= todayYMD()) {
      data[ds] = {
        start: settings.defaultStart,
        end: settings.defaultEnd,
        lunch: settings.defaultLunch
      };
      saveAll();
    }
  }
  render();
}

function setField(ds, field, value) {
  if (!data[ds]) data[ds] = {};
  data[ds][field] = value;
  data[ds].dayOff = false;
  // Auto-fill the other fields with defaults so calc works even if user
  // only touched one input (defaults were shown in inputs anyway).
  if (!data[ds].start) data[ds].start = settings.defaultStart;
  if (!data[ds].end) data[ds].end = settings.defaultEnd;
  if (data[ds].lunch == null) data[ds].lunch = settings.defaultLunch;
  saveAll();
  openDays.add(ds);
  render();
}

function setLunch(ds, value) {
  if (!data[ds]) data[ds] = {};
  data[ds].lunch = value;
  data[ds].dayOff = false;
  // Ensure start/end set to defaults if not already, so calc shows immediately
  if (!data[ds].start) data[ds].start = settings.defaultStart;
  if (!data[ds].end) data[ds].end = settings.defaultEnd;
  saveAll();
  openDays.add(ds);
  render();
}

function toggleDayOff(ds, checked) {
  if (!data[ds]) data[ds] = {};
  if (checked) {
    data[ds] = { dayOff: true };
  } else {
    delete data[ds].dayOff;
  }
  saveAll();
  openDays.add(ds);
  render();
}

function resetDay(ds) {
  if (!data[ds]) { openDays.delete(ds); render(); return; }
  if (!confirm('Effacer les données de ce jour ?')) return;
  delete data[ds];
  openDays.delete(ds);
  saveAll();
  render();
  toast('Jour effacé');
}

function copyPrevious(ds, idx) {
  const dates = weekDates(weekOffset);
  // Find previous filled day (within this week or last week)
  let found = null;
  // Check previous days in current week
  for (let i = idx - 1; i >= 0; i--) {
    const pds = ymd(dates[i]);
    const prev = data[pds];
    if (prev && !prev.dayOff && prev.start && prev.end) { found = prev; break; }
  }
  // Fallback: look in past 14 days
  if (!found) {
    const curDate = new Date(ds);
    for (let i = 1; i <= 14; i++) {
      const pd = new Date(curDate);
      pd.setDate(curDate.getDate() - i);
      const prev = data[ymd(pd)];
      if (prev && !prev.dayOff && prev.start && prev.end) { found = prev; break; }
    }
  }
  if (!found) {
    toast('Aucun jour précédent saisi');
    return;
  }
  data[ds] = {
    start: found.start,
    end: found.end,
    lunch: found.lunch != null ? found.lunch : settings.defaultLunch
  };
  saveAll();
  openDays.add(ds);
  render();
  toast('Copié ✓');
}

function navWeek(dir) {
  weekOffset += dir;
  openDays.clear();
  render();
}
function goToday() {
  weekOffset = 0;
  openDays.clear();
  render();
  const today = todayYMD();
  setTimeout(() => openDays.add(today), 50);
  setTimeout(render, 80);
}

// ================================================================
//  SETTINGS MODAL
// ================================================================
function openSettings() {
  document.getElementById('set-hours').value = settings.hoursPerDay;
  document.getElementById('set-days').value = settings.workDays;
  document.getElementById('set-start').value = settings.defaultStart;
  document.getElementById('set-end').value = settings.defaultEnd;
  document.getElementById('set-lunch').value = settings.defaultLunch;
  document.getElementById('settings-modal').classList.add('open');
}
function closeSettings() {
  document.getElementById('settings-modal').classList.remove('open');
}
function saveSettings() {
  settings.hoursPerDay = parseFloat(document.getElementById('set-hours').value) || 7.5;
  settings.workDays = parseInt(document.getElementById('set-days').value) || 5;
  settings.defaultStart = document.getElementById('set-start').value || '08:00';
  settings.defaultEnd = document.getElementById('set-end').value || '16:30';
  settings.defaultLunch = parseInt(document.getElementById('set-lunch').value);
  saveAll();
  closeSettings();
  render();
  toast('Paramètres enregistrés');
}
function clearAllData() {
  if (!confirm('Supprimer TOUTES les données ? Cette action est irréversible.')) return;
  if (!confirm('Vraiment tout effacer ?')) return;
  data = {};
  saveAll();
  closeSettings();
  render();
  toast('Données effacées');
}
document.getElementById('settings-modal').addEventListener('click', e => {
  if (e.target === e.currentTarget) closeSettings();
});

// ================================================================
//  TOAST
// ================================================================
let toastTimer;
function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), 2000);
}

// ================================================================
//  CALENDAR MODAL
// ================================================================
let calYear, calMonth;
const CAL_MONTHS_FR = ['Janvier','Février','Mars','Avril','Mai','Juin','Juillet','Août','Septembre','Octobre','Novembre','Décembre'];

function openCalendar() {
  const now = new Date();
  calYear = now.getFullYear();
  calMonth = now.getMonth();
  renderCalendar();
  document.getElementById('calendar-modal').classList.add('open');
}
function closeCalendar() {
  document.getElementById('calendar-modal').classList.remove('open');
}
function calPrevMonth() {
  if (calMonth === 0) { calMonth = 11; calYear--; } else calMonth--;
  renderCalendar();
}
function calNextMonth() {
  if (calMonth === 11) { calMonth = 0; calYear++; } else calMonth++;
  renderCalendar();
}
function renderCalendar() {
  document.getElementById('cal-month-label').textContent = `${CAL_MONTHS_FR[calMonth]} ${calYear}`;
  const grid = document.getElementById('cal-grid');
  grid.innerHTML = '';
  ['L','M','M','J','V','S','D'].forEach(d => {
    const el = document.createElement('div');
    el.className = 'cal-day-hdr';
    el.textContent = d;
    grid.appendChild(el);
  });
  const firstDay = new Date(calYear, calMonth, 1);
  let startDow = firstDay.getDay();
  startDow = startDow === 0 ? 6 : startDow - 1;
  for (let i = 0; i < startDow; i++) {
    const el = document.createElement('div');
    el.className = 'cal-day empty';
    grid.appendChild(el);
  }
  const daysInMonth = new Date(calYear, calMonth + 1, 0).getDate();
  const todayStr = todayYMD();
  const todayDate = new Date(); todayDate.setHours(0,0,0,0);
  const todayMon = new Date(todayDate);
  const tdow = todayDate.getDay();
  todayMon.setDate(todayDate.getDate() + (tdow === 0 ? -6 : 1 - tdow));

  for (let day = 1; day <= daysInMonth; day++) {
    const d = new Date(calYear, calMonth, day);
    const ds = ymd(d);
    const dow = d.getDay();
    const isWeekend = dow === 0 || dow === 6;
    const entry = data[ds];
    const el = document.createElement('div');
    el.className = 'cal-day';
    if (isWeekend) { el.classList.add('weekend'); }
    if (ds === todayStr) el.classList.add('today');
    let hoursHtml = '';
    if (entry) {
      if (entry.dayOff) {
        el.classList.add('day-off');
        hoursHtml = '<div class="cal-hours">congé</div>';
      } else {
        const c = calcDay(entry);
        if (c.worked != null) {
          el.classList.add('has-data');
          hoursHtml = `<div class="cal-hours">${fmtMin(c.worked)}</div>`;
        }
      }
    }
    el.innerHTML = `<span>${day}</span>${hoursHtml}`;
    if (!isWeekend) {
      el.onclick = () => {
        const clickedMon = new Date(d);
        const cdow = d.getDay();
        clickedMon.setDate(d.getDate() + (cdow === 0 ? -6 : 1 - cdow));
        weekOffset = Math.round((clickedMon - todayMon) / (7 * 86400000));
        openDays.clear();
        openDays.add(ds);
        render();
        closeCalendar();
        setTimeout(() => window.scrollTo({ top: 0, behavior: 'smooth' }), 50);
      };
    }
    grid.appendChild(el);
  }
}
document.getElementById('calendar-modal').addEventListener('click', e => {
  if (e.target === e.currentTarget) closeCalendar();
});

// ================================================================
//  PWA INSTALL
// ================================================================
let deferredInstallPrompt = null;
window.addEventListener('beforeinstallprompt', e => {
  e.preventDefault();
  deferredInstallPrompt = e;
  document.getElementById('install-btn').classList.remove('hidden');
});
window.addEventListener('appinstalled', () => {
  deferredInstallPrompt = null;
  document.getElementById('install-btn').classList.add('hidden');
});
function installApp() {
  if (!deferredInstallPrompt) return;
  deferredInstallPrompt.prompt();
  deferredInstallPrompt.userChoice.then(() => {
    deferredInstallPrompt = null;
    document.getElementById('install-btn').classList.add('hidden');
  });
}

// ================================================================
//  INIT
// ================================================================
loadAll();
render();

// Auto-expand today on load if current week
if (weekOffset === 0) {
  const t = todayYMD();
  const dates = weekDates(0);
  const inWeek = dates.slice(0, settings.workDays).some(d => ymd(d) === t);
  if (inWeek) {
    openDays.add(t);
    render();
  }
}

// Prevent iOS pull-to-refresh interference on modals
document.body.addEventListener('touchmove', e => {
  if (document.querySelector('.modal-overlay.open')) {
    const modal = e.target.closest('.modal');
    if (!modal) e.preventDefault();
  }
}, { passive: false });
</script>
